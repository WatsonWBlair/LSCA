name: lsca
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Core ML
  - pytorch
  - torchvision
  - numpy
  # Video processing (conda-managed FFmpeg with x264)
  - conda-forge::ffmpeg
  - x264
  - opencv
  # Testing/tooling
  - pytest
  - pip
  - pip:
    - invoke
    - ruff
    - datasets
    - ffmpeg-python
    - mediapipe
    - git+https://github.com/facebookresearch/seamless_interaction.git
